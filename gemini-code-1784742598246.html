<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التميز | Altamyz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">التميز | Altamyz</div>
        <nav>
            <a href="#home">الرئيسية</a>
            <a href="#services">الخدمات</a>
            <a href="#add-service">إضافة خدمة</a>
        </nav>
        <button class="btn" id="loginBtn">تسجيل الدخول</button>
    </header>

    <main class="container">
        <section class="hero" id="home">
            <h1>أهلاً بك في منصة التميز الرقمية</h1>
            <p>منصة كاملة للتحكم في الخدمات والمشاريع وإدارتها بسهولة وسرعة.</p>
        </section>

        <section id="services">
            <h2>الخدمات المتاحة</h2>
            <div id="servicesGrid" class="grid">
                <p>جاري تحميل الخدمات...</p>
            </div>
        </section>

        <section id="add-service" class="form-section">
            <h2>إضافة خدمة جديدة</h2>
            <form id="serviceForm">
                <input type="text" id="title" placeholder="عنوان الخدمة" required>
                <textarea id="description" placeholder="وصف الخدمة" required></textarea>
                <input type="number" id="price" placeholder="السعر ($)" required>
                <button type="submit" class="btn">حفظ الخدمة</button>
            </form>
        </section>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="password" placeholder="كلمة المرور" required>
                <button type="submit" class="btn">دخول</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
